name: CI Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: localhost:5001
  IMAGE_NAME: ml-sentiment-app

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
       - name: Checkout code
         uses: actions/checkout@v4
      
       - name: Set up Python
         uses: actions/setup-python@v5
         with: 
           python-version: '3.11'
        
       - name: Install dependencies
         run: |
          pip install -r requirements.txt
          python -m textblob.download_corpor
          pip install ruff
    
       - name: create reports directory
         run: mkdir -p reports

       - name: Run ruff linter
         run: |
          ruff check src/ tests/ | tee reports/ruff.txt

       - name: Upload lint report 
         if: always()
         uses: actions/upload-artifact@v4
         with: 
           name: ci-reports-${{ gitea.run_id || github.run_id }}
           path: reports/ruff.txt
