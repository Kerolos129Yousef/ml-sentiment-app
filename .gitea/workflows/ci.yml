name: CI Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: localhost:5001
  IMAGE_NAME: ml-sentiment-app

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with: 
          python-version: '3.11'
          cache: 'pip'
        
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff
    
      - name: Create reports directory
        run: mkdir -p reports

      - name: Run ruff linter
        run: |
          ruff check src/ tests/ | tee reports/ruff.txt

      - name: Upload lint report 
        if: always()
        uses: actions/upload-artifact@v3
        with: 
          name: lint-report-${{ github.run_id }}
          path: reports/ruff.txt

  type-check:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mypy
    
      - name: Create reports directory
        run: mkdir -p reports

      - name: Run mypy type checker
        run: |
          mypy src/ > reports/mypy.txt 2>&1 || true
          cat reports/mypy.txt
          mypy src/

      - name: Upload mypy report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: typecheck-report-${{ github.run_id }}
          path: reports/mypy.txt

  test:
    runs-on: ubuntu-latest
    needs: type-check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m textblob.download_corpora
          pip install pytest pytest-cov

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run pytest with coverage
        run: |
          pytest --cov=src \
                 --cov-report=term-missing \
                 --cov-report=html:reports/coverage \
                 2>&1 | tee reports/pytest.txt

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-report-${{ github.run_id }}
          path: |
            reports/pytest.txt
            reports/coverage/

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          TAG=${{ gitea.sha }}

          docker build -t $IMAGE:latest -t $IMAGE:$TAG .

      - name: Push Docker image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          TAG=${{ gitea.sha }}

          docker push $IMAGE:latest
          docker push $IMAGE:$TAG
